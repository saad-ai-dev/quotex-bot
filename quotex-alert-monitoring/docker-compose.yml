version: "3.8"

# Quotex Alert Monitor - Docker Compose
# ALERT-ONLY: Services for monitoring and alerting infrastructure.

services:
  mongodb:
    image: mongo:7.0
    container_name: quotex-alert-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: quotex_monitoring
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quotex-alert-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB_NAME: quotex_monitoring
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","chrome-extension://*"]'
      LOG_LEVEL: INFO
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  mongodb_data:
    driver: local
